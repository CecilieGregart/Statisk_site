<!doctype html>
<html lang="da">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;600;700&family=Lora:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Favicon -->
    <link
      rel="icon"
      type="image/svg+xml"
      href="../svg/FashionRus_favicon.svg"
    />

    <title>Product list</title>
    <link rel="stylesheet" href="../css/style.css" />
  </head>

  <body>
    <header class="header">
      <!-- Logo klik = hjem -->
      <a href="../index.html" class="logo">
        <img src="../svg/logotekst.svg" alt="FashionRus logo" />
      </a>
    </header>

    <main class="container">
      <!-- Back = hjem -->
      <a href="../index.html" class="backlink">← Back</a>
      <h2>Accessories</h2>

      <section class="product_list_container">
        <a class="product_card" href="product.html">
          <div class="img_wrap">
            <img src="../img/smykker.jpg" alt="Earrings" />
          </div>
          <h3>Earrings</h3>
          <p class="brand">Pilgrim</p>
          <p class="price"><span class="new_price">DKK 399</span></p>
        </a>

        <a class="product_card discount" href="product.html">
          <div class="img_wrap">
            <img src="../img/taske.jpg" alt="Bag" />
          </div>
          <h3>Bag</h3>
          <p class="brand">H&amp;M</p>
          <p class="price">
            <span class="old_price">DKK 899</span>
            <span class="new_price">DKK 699</span>
            <span class="discount_text">25%</span>
          </p>
        </a>

        <a class="product_card soldout" href="product.html">
          <div class="img_wrap">
            <img src="../img/tote.jpg" alt="Tote Bag" />
            <span class="soldout_badge">SOLD OUT</span>
          </div>
          <h3>Tote Bag</h3>
          <p class="brand">&amp; Other Stories</p>
          <p class="price"><span class="new_price">DKK 149</span></p>
        </a>

        <a class="product_card discount soldout" href="product.html">
          <div class="img_wrap">
            <img src="../img/scarf.jpg" alt="Knitted scarf" />
            <span class="soldout_badge">SOLD OUT</span>
          </div>
          <h3>Knitted scarf</h3>
          <p class="brand">ARKET</p>
          <p class="price">
            <span class="old_price">DKK 549</span>
            <span class="new_price">DKK 449</span>
            <span class="discount_text">30%</span>
          </p>
        </a>
      </section>
    </main>
  </body>
</html>
