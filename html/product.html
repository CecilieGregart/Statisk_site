<!doctype html>
<html lang="da">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;600;700&family=Lora:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Favicon -->
    <link
      rel="icon"
      type="image/svg+xml"
      href="../svg/FashionRus_favicon.svg"
    />

    <title>Product</title>
    <link rel="stylesheet" href="../css/style.css" />
    <script src="../js/product.js" defer></script>
  </head>

  <body>
    <header class="header">
      <!-- Logo klik = hjem -->
      <a href="../index.html" class="logo">
        <img src="../svg/logotekst.svg" alt="FashionRus logo" />
      </a>
    </header>

    <main class="container">
      <section class="product_page">
        <div class="product_media">
          <img src="" alt="" />
          <span class="product_discount"></span>
        </div>

        <div class="product_info">
          <h2 class="product_title"></h2>
          <p class="product_brand"></p>

          <dl class="product_meta">
            <div class="meta_row">
              <dt>Category</dt>
              <dd></dd>
            </div>

            <div class="meta_row">
              <dt>Color</dt>
              <dd></dd>
            </div>

            <div class="meta_row">
              <dt>Price</dt>
              <dd class="product_price">
                <span class="old_price"></span>
                <span class="new_price"></span>
              </dd>
            </div>

            <div class="meta_row">
              <dt>Stock</dt>
              <dd></dd>
            </div>
          </dl>

          <button class="add_to_basket" type="button">Add to basket</button>
        </div>
      </section>
    </main>
  </body>
</html>
