<!doctype html>
<html lang="da">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;600;700&family=Lora:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Favicon -->
    <link
      rel="icon"
      type="image/svg+xml"
      href="../svg/FashionRus_favicon.svg"
    />

    <title>Product</title>
    <link rel="stylesheet" href="../css/style.css" />
  </head>

  <body>
    <header class="header">
      <!-- Logo klik = hjem -->
      <a href="../index.html" class="logo">
        <img src="../svg/logotekst.svg" alt="FashionRus logo" />
      </a>
    </header>

    <main class="container">
      <a href="productlist.html" class="backlink">← Back</a>

      <section class="product_page">
        <div class="product_media">
          <img src="../img/taske.jpg" alt="Bag" />
          <span class="product_discount">25%</span>
        </div>

        <div class="product_info">
          <h2 class="product_title">Bag</h2>
          <p class="product_brand">H&M</p>

          <p class="product_price">
            <span class="old_price">DKK 899</span>
            <span class="new_price">DKK 699</span>
          </p>

          <dl class="product_meta">
            <div class="meta_row">
              <dt>Category</dt>
              <dd>Accessories</dd>
            </div>

            <div class="meta_row">
              <dt>Color</dt>
              <dd>Beige</dd>
            </div>

            <div class="meta_row">
              <dt>Size</dt>
              <dd>One size</dd>
            </div>

            <div class="meta_row">
              <dt>Stock</dt>
              <dd>In stock</dd>
            </div>
          </dl>

          <button class="add_to_basket" type="button">Add to basket</button>
        </div>
      </section>
    </main>
  </body>
</html>
